<section class="sistema">
  <button type="button" class="btn-fechar" onclick="fecharModal()">
    &times;
  </button>
  <h1>Denunciar Foco de Incêndio</h1>
  <form id="formDenuncia">
    <mapbox-search-box 
      id="local-busca"
      access-token="pk.eyJ1IjoidGhhbGVzMDEwMiIsImEiOiJjbXF1ejl0ZmYweGhiMnlweHNsOXQ5MDh1In0.6HTif46NMbTzBDk5upg9TQ"
      placeholder="Ex: Parque Municipal, Belo Horizonte"
      proximity="-43.9352,-19.9208"
      theme='{
        "variables": {
        "fontFamily": "sans-serif",
        "borderRadius": "6px",
        "fontSize": "12px",
        "unit": "10px"
        }
      }'>
    </mapbox-search-box>

    <div>
      <label>Data:</label>
      <input type="date" id="data" required />
    </div>

    <div class="field" style="margin-bottom: 0; margin-top: 18px">
      <label>Gravidade</label>
      <div class="gravidade-grid">
        <div>
          <input
            type="radio"
            name="gravidade"
            id="g-baixa"
            value="Baixa"
            class="grav-opt"
            checked=""
          />
          <label class="grav-label" for="g-baixa">
            <span class="dot dot-green"></span> Baixa
          </label>
        </div>
        <div>
          <input
            type="radio"
            name="gravidade"
            id="g-media"
            value="Média"
            class="grav-opt"
          />
          <label class="grav-label" for="g-media">
            <span class="dot dot-ember"></span> Média
          </label>
        </div>
        <div>
          <input
            type="radio"
            name="gravidade"
            id="g-alta"
            value="Alta"
            class="grav-opt"
          />
          <label class="grav-label" for="g-alta">
            <span class="dot dot-fire"></span> Alta
          </label>
        </div>
        <div>
          <input
            type="radio"
            name="gravidade"
            id="g-critica"
            value="Crítica"
            class="grav-opt"
          />
          <label class="grav-label" for="g-critica">
            <span class="dot dot-danger"></span> Crítica
          </label>
        </div>
      </div>
    </div>

    <div>
      <label>Descrição:</label>
      <textarea id="descricao" rows="4"></textarea>
    </div>
    <div>
      <label>Foto (opcional):</label>
      <input type="file" id="foto" accept="image/*" />
    </div>
    <button type="submit">Enviar Denúncia</button>
  </form>
</section>
